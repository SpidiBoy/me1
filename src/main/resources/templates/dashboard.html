<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Dashboard', activePage='dashboard', content=~{::main-content})}">
<head><title>Dashboard</title></head>
<body>
<th:block th:fragment="main-content">

    <!-- Tarjetas de estadísticas -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Citas hoy</div>
            <div class="stat-value" th:text="${citasHoy}">0</div>
            <div class="stat-hint" th:text="${citasPendientes} + ' pendientes'">0 pendientes</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Mascotas registradas</div>
            <div class="stat-value" th:text="${totalMascotas}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Clientes activos</div>
            <div class="stat-value" th:text="${totalClientes}">0</div>
        </div>
    </div>

    <!-- Botones acceso rápido -->
    <div style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        <a th:href="@{/catalogo}" class="btn btn-primary" style="
            background: linear-gradient(135deg, #f50057, #ff5c8a);
            border: none; border-radius: 50px; padding: 10px 24px;
            font-size: 13px; font-weight: 600; color: white;
            text-decoration: none; display: inline-flex;
            align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(245,0,87,0.25);
            transition: transform 0.2s, box-shadow 0.2s;"
            onmouseover="this.style.transform='scale(1.04)'"
            onmouseout="this.style.transform='scale(1)'">
            🐾 Página Web Principal
        </a>
        <a th:href="@{/logout}" class="btn" style="
            background: #fff; border: 1px solid #e0e0e0;
            border-radius: 50px; padding: 10px 22px;
            font-size: 13px; color: #666; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;">
            🚪 Cerrar sesión
        </a>
    </div>

    <!-- Citas del día -->
    <div class="card">
        <div class="card-header">
            <span class="section-title">Citas de hoy</span>
            <a th:href="@{/citas/nueva}" class="btn btn-primary">+ Nueva cita</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Mascota</th>
                    <th>Dueño / Solicitante</th>
                    <th>Servicio</th>
                    <th>Responsable</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cita : ${citasDelDia}">
                    <td th:text="${cita.hora}">—</td>
                    <td th:text="${cita.mascota.nombre}">—</td>
                    <!-- Muestra el dueño de la mascota si existe, si no el responsable/solicitante -->
                    <td th:text="${cita.mascota.cliente != null ? cita.mascota.cliente.nombre : cita.responsable}">—</td>
                    <td th:text="${cita.servicio.nombre}">—</td>
                    <td th:text="${cita.responsable ?: '—'}">—</td>
                    <td>
                        <span th:text="${cita.estado}"
                              th:classappend="${cita.estado == 'COMPLETADO' ? ' status--done'   :
                                               cita.estado == 'EN_CURSO'   ? ' status--active' :
                                               cita.estado == 'CANCELADO'  ? ' status--cancel' : ' status--pending'}"
                              class="status">—</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(citasDelDia)}">
                    <td colspan="6" style="text-align:center;color:#888">Sin citas para hoy.</td>
                </tr>
            </tbody>
        </table>
    </div>

</th:block>
</body>
</html>
