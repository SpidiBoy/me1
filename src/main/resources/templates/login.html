<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Pet Spa Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

    <style>
        :root {
            --color-spa: #f50057;
            --fondo-suave: #fff1f3;
        }

        body {
            background: linear-gradient(135deg, #fff1f3 0%, #fce4ec 100%);
        }

        .btn-spa {
            background-color: var(--color-spa);
            color: white;
            border-radius: 50px;
            border: none;
            transition: 0.3s;
        }

        .btn-spa:hover {
            background-color: #d4004b;
            color: white;
            transform: scale(1.02);
        }

        .login-card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(245, 0, 87, 0.12);
        }

        .brand-paw {
            font-size: 3rem;
            filter: drop-shadow(0 2px 6px rgba(245,0,87,0.25));
        }

        .alert-danger {
            border-radius: 12px;
            font-size: 0.88rem;
        }

        .form-control:focus {
            border-color: var(--color-spa);
            box-shadow: 0 0 0 0.2rem rgba(245, 0, 87, 0.15);
        }

        a { color: var(--color-spa); }
    </style>
</head>

<body class="d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card login-card">
                    <div class="card-body p-5">

                        <!-- Encabezado -->
                        <div class="text-center mb-4">
                            <img th:src="@{/img/logo03.png}" alt="Logo Pet Spa" style="max-height: 80px; margin-bottom: 10px;" />
                            <h2 class="fw-bold mt-2" style="color: var(--color-spa);">Pet Spa Admin</h2>
                            <p class="text-muted small">Ingresa tus credenciales para acceder al panel</p>
                        </div>

                        <!-- Alerta de error (solo si Spring la envía) -->
                        <div th:if="${error}" class="alert alert-danger text-center py-2" th:text="${error}"></div>

                        <!-- Formulario → POST /login -->
                        <form th:action="@{/login}" method="post">

                            <!-- Email -->
                            <div class="form-floating mb-3">
                                <input type="email"
                                       class="form-control border-0 bg-light shadow-sm"
                                       id="email"
                                       name="email"
                                       placeholder="name@example.com"
                                       required>
                                <label class="text-secondary">Correo electrónico</label>
                            </div>

                            <!-- Password -->
                            <div class="form-floating mb-3">
                                <input type="password"
                                       class="form-control border-0 bg-light shadow-sm"
                                       id="password"
                                       name="password"
                                       placeholder="Contraseña"
                                       required>
                                <label class="text-secondary">Contraseña</label>
                            </div>

                            <!-- Recordarme -->
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="recordarme">
                                <label class="form-check-label text-muted small" for="recordarme">
                                    Recordarme
                                </label>
                            </div>

                            <!-- Botón de acceso -->
                            <button type="submit" class="btn btn-spa w-100 py-3 fw-bold">
                                ENTRAR AL PANEL
                            </button>

                            <!-- Links extra -->
                            <div class="text-center mt-4">
                                <a href="#" class="text-decoration-none small fw-medium"
                                   onclick="alert('Aún no disponible 🤧'); return false;">
                                    ¿Olvidaste tu contraseña?
                                </a>
                                <hr class="my-3 text-muted">
                                <p class="small text-muted mb-2">
                                    ¿Quieres ver nuestra web?
                                </p>
                                <a th:href="@{/catalogo}" class="text-decoration-none small fw-bold">
                                    🐾 Visitar Coquetos Spa
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
