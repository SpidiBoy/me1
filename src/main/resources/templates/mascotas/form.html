<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Mascota', activePage='mascotas', content=~{::main-content})}">
<head><title>Mascota</title></head>
<body>
<th:block th:fragment="main-content">

    <div class="toolbar">
        <span class="section-title"
              th:text="${mascota.id != null ? 'Editar mascota' : 'Registrar nueva mascota'}">Mascota</span>
        <a th:href="@{/mascotas}" class="btn">← Volver a mascotas</a>
    </div>

    <div class="card form-card">

        <form th:action="${mascota.id != null ? '/mascotas/' + mascota.id + '/editar' : '/mascotas/nueva'}"
              th:object="${mascota}"
              method="post">

            <!-- ── Sección: Datos de la mascota ───────────────────────── -->
            <p style="font-size:12px; font-weight:700; color:#888; text-transform:uppercase;
                      letter-spacing:0.05em; margin-bottom:14px; border-bottom:1px solid #eee; padding-bottom:8px;">
                🐾 Datos de la mascota
            </p>

            <div class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" th:field="*{nombre}"
                           placeholder="Ej: Rocky" required/>
                </div>

                <div class="form-group">
                    <label for="especie">Especie *</label>
                    <select id="especie" th:field="*{especie}" required>
                        <option value="">— Seleccione —</option>
                        <option value="Perro">🐶 Perro</option>
                        <option value="Gato">🐱 Gato</option>
                        <option value="Conejo">🐰 Conejo</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="raza">Raza</label>
                    <input type="text" id="raza" th:field="*{raza}"
                           placeholder="Ej: Golden Retriever"/>
                </div>

                <div class="form-group">
                    <label for="tamano">Tamaño</label>
                    <select id="tamano" th:field="*{tamano}">
                        <option value="">— Seleccione —</option>
                        <option value="Pequeño">Pequeño (hasta 10 kg)</option>
                        <option value="Mediano">Mediano (10–25 kg)</option>
                        <option value="Grande">Grande (más de 25 kg)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edad">Edad (años)</label>
                    <input type="number" id="edad" th:field="*{edad}"
                           min="0" max="30" placeholder="Ej: 3"/>
                </div>

                <div class="form-group">
                    <label for="genero">Género</label>
                    <select id="genero" th:field="*{genero}">
                        <option value="">— Seleccione —</option>
                        <option value="Macho">Macho</option>
                        <option value="Hembra">Hembra</option>
                    </select>
                </div>
            </div>

            <!-- ── Sección: Dueño ─────────────────────────────────────── -->
            <p style="font-size:12px; font-weight:700; color:#888; text-transform:uppercase;
                      letter-spacing:0.05em; margin: 20px 0 14px; border-bottom:1px solid #eee; padding-bottom:8px;">
                👤 Dueño de la mascota
            </p>

            <div class="form-grid">
                <div class="form-group" style="grid-column: span 2;">
                    <label for="clienteId">Seleccionar cliente *</label>
                    <!--
                        clientePreseleccionado lo agrega el controller cuando viene
                        desde /mascotas/nueva?clienteId=X  (botón "Agregar mascota" del cliente)
                    -->
                    <select id="clienteId" name="clienteId" required>
                        <option value="">— Busca y selecciona el dueño —</option>
                        <option th:each="c : ${clientes}"
                                th:value="${c.id}"
                                th:text="${c.nombre} + ' · ' + ${c.telefono ?: 'sin teléfono'}"
                                th:selected="${clientePreseleccionado != null and c.id == clientePreseleccionado}">
                            —
                        </option>
                    </select>
                    <small style="color:#888; font-size:11px; margin-top:4px;">
                        ¿El cliente no existe aún?
                        <a th:href="@{/clientes/nuevo}" style="color:#639922;">Regístralo primero aquí</a>
                    </small>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${mascota.id != null ? 'Actualizar mascota' : 'Guardar mascota'}">Guardar</span>
                </button>
                <a th:href="@{/mascotas}" class="btn">Cancelar</a>
            </div>
        </form>
    </div>

</th:block>
</body>
</html>
