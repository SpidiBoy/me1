<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, activePage, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Pet Spa Admin'">Pet Spa Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="layout">

    <!-- ── Sidebar ──────────────────────────────────────────── -->
    <nav class="sidebar">
        <div class="brand">
            <img th:src="@{/img/logo03.png}" alt="Logo" style="height: 40px; margin-right: 10px;" />
            <div>
                <div class="brand-title">Pet Spa Admin</div>
                <div class="brand-sub">Panel de gestión</div>
            </div>
        </div>
        <a th:href="@{/}"          th:classappend="${activePage == 'dashboard'  ? ' active' : ''}" class="nav-item">📊 Dashboard</a>
        <a th:href="@{/mascotas}"  th:classappend="${activePage == 'mascotas'   ? ' active' : ''}" class="nav-item">🐕 Mascotas</a>
        <a th:href="@{/citas}"     th:classappend="${activePage == 'citas'      ? ' active' : ''}" class="nav-item">📅 Citas</a>
        <a th:href="@{/servicios}" th:classappend="${activePage == 'servicios'  ? ' active' : ''}" class="nav-item">✂️ Servicios</a>
        <a th:href="@{/clientes}"  th:classappend="${activePage == 'clientes'   ? ' active' : ''}" class="nav-item">👥 Clientes</a>
        <hr class="nav-divider"/>
        <a th:href="@{/citas/nueva}" class="nav-item nav-item--highlight">➕ Nueva cita</a>
        <hr class="nav-divider"/>
        <!-- Acceso rápido al catálogo público -->
        <a th:href="@{/catalogo}" class="nav-item" style="color: #f50057; font-weight: 600;">🌐 Web Principal</a>
        <!-- Cerrar sesión -->
        <a th:href="@{/logout}" class="nav-item" style="color: #888; margin-top: auto;">🚪 Cerrar sesión</a>
    </nav>

    <!-- ── Contenido principal ──────────────────────────────── -->
    <main class="main">
        <div class="topbar">
            <h1 class="page-title" th:text="${pageTitle}">Dashboard</h1>
            <div style="display:flex; align-items:center; gap:16px;">
                <a th:href="@{/catalogo}"
                   style="font-size:12px; color:#f50057; text-decoration:none; font-weight:600;
                          background:#fff1f3; padding:5px 14px; border-radius:50px; border:1px solid #fbb;">
                    🌐 Página Web
                </a>
                <span class="topbar-user">👤 Admin</span>
                <a th:href="@{/logout}"
                   style="font-size:12px; color:#888; text-decoration:none;">
                    Salir
                </a>
            </div>
        </div>
        <div class="content">
            <!-- El contenido de cada página se inserta aquí -->
            <div th:replace="${content}">Contenido</div>
        </div>
    </main>

</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
