<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Nueva cita', activePage='citas', content=~{::main-content})}">

<head><title>Nueva cita</title></head>

<body>
<th:block th:fragment="main-content">

<style>
/* ── Búsqueda autocomplete ── */
.search-wrap { position: relative; }
.search-wrap input { width: 100%; }
.autocomplete-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #fff; border: 1px solid #d0d0d0; border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.10); z-index: 999;
    max-height: 220px; overflow-y: auto; display: none;
}
.autocomplete-list li {
    padding: 9px 14px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid #f0f0f0; list-style: none;
    display: flex; justify-content: space-between; align-items: center;
}
.autocomplete-list li:last-child { border-bottom: none; }
.autocomplete-list li:hover,
.autocomplete-list li.active { background: #eaf3de; }
.autocomplete-list li .pet-owner { font-size: 11px; color: #888; }

/* ── Checkboxes de servicios ── */
.servicios-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 10px;
    margin-top: 4px;
}
.servicio-check-card {
    border: 2px solid #e8e8e8; border-radius: 10px;
    padding: 12px 14px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
    user-select: none;
}
.servicio-check-card:hover { border-color: #a8cc6a; background: #f7fbf0; }
.servicio-check-card.selected { border-color: #639922; background: #eaf3de; }
.servicio-check-card input[type="checkbox"] { display: none; }
.svc-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.svc-name { font-size: 13px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
.svc-meta { font-size: 11px; color: #888; margin-top: 2px; }

/* ── Resumen selección ── */
.resumen-servicios {
    background: #f7fbf0; border: 1px solid #c5e09a; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; margin-top: 10px;
    display: none;
}
.resumen-servicios.visible { display: block; }
.resumen-total { font-weight: 700; color: #3b6d11; }

/* ── Error fecha ── */
.field-error { color: #a32d2d; font-size: 12px; margin-top: 4px; }
</style>

<div class="toolbar">
    <span class="section-title">Registrar nueva cita</span>
    <a th:href="@{/citas}" class="btn">← Volver</a>
</div>

<!-- Error de fecha -->
<div th:if="${errorFecha}"
     style="background:#fcebeb; border-left:4px solid #e53e3e; border-radius:6px;
            padding:10px 16px; margin-bottom:16px; font-size:13px; color:#a32d2d;">
    ⚠️ <span th:text="${errorFecha}"></span>
</div>

<div class="card form-card" style="max-width: 800px;">

    <form th:action="@{/citas/nueva}" method="post" id="formNuevaCita">

        <!-- ── Sección 1: Mascota ─────────────────────────────────────── -->
        <p class="form-section-label">🐾 Mascota</p>

        <!-- Búsqueda escrita (autocomplete) -->
        <div class="form-group" style="margin-bottom: 16px;">
            <label for="buscarMascota">Buscar mascota por nombre o dueño</label>
            <div class="search-wrap">
                <input type="text" id="buscarMascota"
                       placeholder="Escribe el nombre de la mascota o del dueño..."
                       autocomplete="off" />
                <ul class="autocomplete-list" id="autoList"></ul>
            </div>
            <!-- Campo oculto real que se envía -->
            <input type="hidden" name="mascotaId" id="mascotaId" required />
            <div id="mascotaSeleccionada"
                 style="display:none; margin-top:8px; background:#e8f4fd; border-radius:6px;
                        padding:8px 12px; font-size:13px; color:#185fa5;">
                ✔ <span id="mascotaLabel"></span>
                <button type="button" onclick="limpiarMascota()"
                        style="border:none;background:none;cursor:pointer;color:#888;margin-left:8px;">✖</button>
            </div>
            <small style="color:#888; font-size:11px;">
                ¿No aparece?
                <a th:href="@{/mascotas/nueva}" style="color:#639922;">Registra la mascota primero</a>
            </small>
        </div>

        <!-- ── Sección 2: Servicios ───────────────────────────────────── -->
        <p class="form-section-label">✂️ Servicios <span style="font-weight:400;color:#aaa;">(selecciona uno o más)</span></p>

        <div class="servicios-grid" id="serviciosGrid">
            <label class="servicio-check-card" th:each="s : ${servicios}"
                   th:data-id="${s.id}"
                   th:data-precio="${s.precio}"
                   th:data-duracion="${s.duracionMinutos}">
                <input type="checkbox" name="servicioIds" th:value="${s.id}" />
                <span class="svc-icon" th:text="${s.icono}">🐾</span>
                <div>
                    <div class="svc-name" th:text="${s.nombre}">Servicio</div>
                    <div class="svc-meta">
                        <span th:text="'S/ ' + ${s.precio}">S/ 0</span>
                        · <span th:text="${s.duracionMinutos} + ' min'">0 min</span>
                    </div>
                </div>
            </label>
        </div>

        <div class="resumen-servicios" id="resumenServicios">
            <span id="resumenTexto"></span> —
            <span class="resumen-total" id="resumenTotal"></span>
            · <span id="resumenDuracion"></span>
        </div>
        <div id="errorServicios" class="field-error" style="display:none;">
            Selecciona al menos un servicio.
        </div>

        <!-- ── Sección 3: Fecha y hora ────────────────────────────────── -->
        <p class="form-section-label" style="margin-top:20px;">📅 Fecha y hora</p>

        <div class="form-grid">
            <div class="form-group">
                <label for="fecha">Fecha <span style="color:#e53e3e;">*</span></label>
                <input type="date" id="fecha" name="fecha"
                       th:min="${hoy}" required />
                <span class="field-error" id="errorFechaInline"></span>
            </div>
            <div class="form-group">
                <label for="hora">Hora <span style="color:#e53e3e;">*</span></label>
                <input type="time" id="hora" name="hora"
                       min="08:00" max="19:00" required />
            </div>
        </div>

        <!-- ── Sección 4: Responsable y notas ────────────────────────── -->
        <p class="form-section-label" style="margin-top:20px;">👤 Responsable y notas</p>

        <div class="form-grid">
            <div class="form-group">
                <label for="responsable">Responsable</label>
                <select id="responsable" name="responsable">
                    <option value="Sofía R.">Sofía R.</option>
                    <option value="Javier M.">Javier M.</option>
                </select>
            </div>
            <div class="form-group">
                <label for="notas">Notas</label>
                <input type="text" id="notas" name="notas"
                       placeholder="Alergias, instrucciones especiales..." />
            </div>
        </div>

        <div class="form-actions" style="margin-top:24px;">
            <button type="submit" class="btn btn-primary" id="btnGuardar">Confirmar cita</button>
            <a th:href="@{/citas}" class="btn">Cancelar</a>
        </div>
    </form>
</div>

<!-- Datos de mascotas para el autocomplete (JSON embebido) -->
<script th:inline="javascript">
    /*<![CDATA[*/
    const MASCOTAS = /*[[${mascotas}]]*/ [];
    /*]]>*/
</script>

<script>
// ── Autocomplete de mascotas ────────────────────────────────────────────────
const inputBuscar = document.getElementById('buscarMascota');
const autoList    = document.getElementById('autoList');
const mascotaId   = document.getElementById('mascotaId');
const mascotaSelDiv  = document.getElementById('mascotaSeleccionada');
const mascotaLabel   = document.getElementById('mascotaLabel');

function normalizarTexto(str) {
    return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function renderLista(filtradas) {
    autoList.innerHTML = '';
    if (!filtradas.length) {
        autoList.style.display = 'none';
        return;
    }
    filtradas.forEach(m => {
        const li = document.createElement('li');
        const dueno = m.cliente ? m.cliente.nombre : '—';
        li.innerHTML = `<span><strong>${m.nombre}</strong> · ${m.especie}${m.raza ? ' / ' + m.raza : ''}</span>
                        <span class="pet-owner">👤 ${dueno}</span>`;
        li.addEventListener('click', () => seleccionarMascota(m));
        autoList.appendChild(li);
    });
    autoList.style.display = 'block';
}

inputBuscar.addEventListener('input', () => {
    const q = normalizarTexto(inputBuscar.value);
    if (q.length < 1) { autoList.style.display = 'none'; return; }
    const filtradas = MASCOTAS.filter(m => {
        const nombre = normalizarTexto(m.nombre);
        const dueno  = normalizarTexto(m.cliente ? m.cliente.nombre : '');
        const especie = normalizarTexto(m.especie || '');
        return nombre.includes(q) || dueno.includes(q) || especie.includes(q);
    }).slice(0, 8);
    renderLista(filtradas);
});

function seleccionarMascota(m) {
    mascotaId.value = m.id;
    const dueno = m.cliente ? ' · ' + m.cliente.nombre : '';
    mascotaLabel.textContent = m.nombre + ' (' + m.especie + ')' + dueno;
    inputBuscar.value = '';
    autoList.style.display = 'none';
    mascotaSelDiv.style.display = 'block';
    inputBuscar.style.display = 'none';
}

function limpiarMascota() {
    mascotaId.value = '';
    mascotaSelDiv.style.display = 'none';
    inputBuscar.style.display = 'block';
    inputBuscar.value = '';
    inputBuscar.focus();
}

// Cerrar lista al hacer click fuera
document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) autoList.style.display = 'none';
});

// ── Selección de servicios (checkboxes visuales) ─────────────────────────────
const cards = document.querySelectorAll('.servicio-check-card');
const resumen = document.getElementById('resumenServicios');
const resumenTexto   = document.getElementById('resumenTexto');
const resumenTotal   = document.getElementById('resumenTotal');
const resumenDuracion = document.getElementById('resumenDuracion');

cards.forEach(card => {
    card.addEventListener('click', () => {
        const cb = card.querySelector('input[type="checkbox"]');
        cb.checked = !cb.checked;
        card.classList.toggle('selected', cb.checked);
        actualizarResumen();
    });
});

function actualizarResumen() {
    const seleccionadas = [...cards].filter(c => c.querySelector('input').checked);
    if (!seleccionadas.length) { resumen.classList.remove('visible'); return; }

    let total = 0, duracion = 0, nombres = [];
    seleccionadas.forEach(c => {
        total    += parseFloat(c.dataset.precio || 0);
        duracion += parseInt(c.dataset.duracion || 0);
        nombres.push(c.querySelector('.svc-name').textContent);
    });
    resumenTexto.textContent    = nombres.join(' + ');
    resumenTotal.textContent    = 'S/ ' + total.toFixed(2);
    resumenDuracion.textContent = duracion + ' min';
    resumen.classList.add('visible');
}

// ── Validación de fecha ───────────────────────────────────────────────────────
const inputFecha = document.getElementById('fecha');
const errorFechaInline = document.getElementById('errorFechaInline');

inputFecha.addEventListener('change', () => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const sel = new Date(inputFecha.value + 'T00:00:00');
    if (sel < hoy) {
        errorFechaInline.textContent = '⚠ La fecha no puede ser anterior a hoy.';
        inputFecha.style.borderColor = '#e53e3e';
    } else {
        errorFechaInline.textContent = '';
        inputFecha.style.borderColor = '';
    }
});

// ── Validación al enviar ──────────────────────────────────────────────────────
document.getElementById('formNuevaCita').addEventListener('submit', e => {
    let ok = true;

    // Validar mascota
    if (!mascotaId.value) {
        alert('Selecciona una mascota antes de continuar.');
        ok = false;
    }

    // Validar al menos un servicio
    const algunoChecked = [...document.querySelectorAll('input[name="servicioIds"]')]
                          .some(cb => cb.checked);
    if (!algunoChecked) {
        document.getElementById('errorServicios').style.display = 'block';
        ok = false;
    } else {
        document.getElementById('errorServicios').style.display = 'none';
    }

    // Validar fecha
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const sel = new Date(inputFecha.value + 'T00:00:00');
    if (sel < hoy) {
        errorFechaInline.textContent = '⚠ La fecha no puede ser anterior a hoy.';
        inputFecha.style.borderColor = '#e53e3e';
        ok = false;
    }

    if (!ok) e.preventDefault();
});
</script>

<!-- Estilos extra para la sección label -->
<style>
.form-section-label {
    font-size: 12px; font-weight: 700; color: #639922;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid #e8e8e8;
}
</style>

</th:block>
</body>
</html>
